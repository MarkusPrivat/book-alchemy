<!DOCTYPE html>
<html lang="en">
<head>
    <title>Add Author</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="top-nav">
        <a href="{{ url_for('home') }}" class="back-link"><i class="fas fa-arrow-left"></i> Back to Library</a>
    </div>
    <h1>Add New Author</h1>

    <div class="form-container">
        <form action="/add_author" method="POST">
            <div class="form-group">
                <label for="name">Author Name</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
                <label for="birthdate">Birthdate</label>
                <input type="date" id="birthdate" name="birthdate" required>
            </div>

            <div class="form-group">
                <label for="date_of_death">Date of Death (optional)</label>
                <input type="date" id="date_of_death" name="date_of_death">
            </div>

            <button type="submit">Add Author</button>
        </form>
    </div>
</body>
</html>
